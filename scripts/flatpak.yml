id: io.github.q962.PictureWindow
runtime: org.gnome.Platform
runtime-version: "49"
branch: test
sdk: org.gnome.Sdk
command: PictureWindow
appstream-compose: false

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc

modules:
  - name: xmake
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/xmake-io/xmake.git
        tag: v3.0.5
        commit: f20295f255d967af9d91de6f1ed5eeadf17d30a7
    cleanup:
      - "*"

  - name: PictureWindow
    buildsystem: simple
    build-commands:
      - |
        set -e

        export XMAKE_GLOBALDIR=/run/temp/xmake
        export XMAKE_ROOT=y
        xmake g --network=private

        xmake f --mode=releasedbg
        xmake b
        xmake install -o /app

        eu-unstrip /app/bin/PictureWindow /app/bin/PictureWindow.sym -o PictureWindow
        mv PictureWindow /app/bin
        rm /app/bin/*.sym
    sources:
      - type: file
        path: archive.tar
      - type: shell
        commands: [tar -xf archive.tar]
